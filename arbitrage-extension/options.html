<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Arbitrage Settings</title>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }
    h2 {
      margin-top: 0;
      background: linear-gradient(to right, #60a5fa, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      color: #94a3b8;
    }
    input {
      width: 100%;
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      box-sizing: border-box;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #60a5fa;
    }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:hover {
      opacity: 0.9;
    }
    button:active {
      transform: scale(0.98);
    }
    #status {
      text-align: center;
      margin-top: 16px;
      font-size: 0.9rem;
      color: #10b981;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Elite Configuration</h2>
    
    <div class="form-group">
      <label for="ebayFeeRate">eBay Fee Rate (%)</label>
      <input type="number" id="ebayFeeRate" step="0.01" placeholder="13.25">
    </div>
    
    <div class="form-group">
      <label for="shippingCost">Default Shipping Cost ($)</label>
      <input type="number" id="shippingCost" step="0.01" placeholder="6.00">
    </div>
    
    <div class="form-group">
      <label for="packagingCost">Default Packaging Cost ($)</label>
      <input type="number" id="packagingCost" step="0.01" placeholder="1.00">
    </div>

    <div class="form-group">
      <label for="targetMultiplier">Target eBay Sale Multiplier</label>
      <input type="number" id="targetMultiplier" step="0.1" placeholder="1.6">
    </div>

    <button id="saveBtn">Save Elite Settings</button>
    <div id="status"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
